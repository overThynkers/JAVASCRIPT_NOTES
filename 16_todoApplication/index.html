<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo Application</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            padding: 3rem 0 0;
            background-color: #111;
            color: #fafafa;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            margin: 0 0 30px;
            text-transform: uppercase;
            font-size: 30px;
        }
        #todo-input {
            font-size: 20px;
            width: 600px;
            padding: 10px 10px;
        }
        #addTodoBtn  {
            padding: 10px 20px;
            font-size: 20px;
            text-transform: uppercase;
            background-color: #0ada;
            border: 2px solid transparent;
            transition: all 300ms ease;
            cursor: pointer;

        }
        #addTodoBtn:hover {
            border-color: #0ada;
            color: #fff;
            background: none;
        }
        .todos-container {
            margin: 70px 0 0;
            width: 100%;
            padding: 0 0 0 20px;
        }
        ul {
            list-style: none;
        }
        .todo-item {
            font-size: 20px;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            padding: 15px 15px;
            justify-content: space-between;
            margin: 0 0 10px;
            border-radius: 16px;
            cursor: pointer;
        }
        .todo-item:hover p,
        .todo-item.active p {
            text-decoration: line-through;
            color: #ccc;
        }
        .delete-todo {
            padding: 10px 20px;
            font: 16px;
            text-transform: uppercase;
            font-weight: 800;
            background-color: #0ada;
            border: 2px solid transparent;
            transition: all 300ms ease;
            border-radius: 20px;
            cursor: pointer;
        }
        .delete-todo:hover {
            border-color: #0ada;
            color: #fff;
            background: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header">Simple Todo List</h2>
        <div class="input-container">
            <input type="text" placeholder="Enter your todo..." id="todo-input">
            <button id="addTodoBtn">Add todo</button>
        </div>
        <ul class="todos-container">
        </ul>
    </div>
    <script>
        let todos = JSON.parse(window.localStorage.getItem("todosData")) || [];

        const eventListeners = (item) => {
            if(!item) return;
            item.addEventListener("click", (e) => {
                item.classList.toggle("active");
                if(e.target.classList.contains("delete-todo")) {
                    let paragraphEl = e.target.previousElementSibling;
                    let indexOfElement = todos.indexOf(paragraphEl.textContent.toLowerCase());
                    todos.splice(indexOfElement, 1);
                    window.localStorage.setItem("todosData", JSON.stringify(todos));
                    e.target.parentElement.remove();
                }
            });
        };

        const addTodo = (userInput) => {
            const appendContainerEl = document.querySelector(".todos-container");
            if(!appendContainerEl) return;
            let listItemEl = document.createElement("li");
            listItemEl.className = "todo-item";
            let paraEl = document.createElement("p");
            paraEl.textContent = userInput;
            listItemEl.appendChild(paraEl);
            let deleteBtnEl = document.createElement("button");
            deleteBtnEl.className = "delete-todo";
            deleteBtnEl.textContent = "Delete";
            listItemEl.appendChild(deleteBtnEl);
            eventListeners(listItemEl);
            appendContainerEl.appendChild(listItemEl);
        };

        const reloadHandler = () => todos.forEach(curEl => addTodo(curEl)); reloadHandler();
        const FilterTodos = (userInputValue) => {
            let isCopied;
            if(todos.length > 0) {
                isCopied = todos.some(curEl => {
                    if(curEl.toLowerCase() === userInputValue.toLowerCase()) {
                        return true;
                    } else {
                        return false;
                    }
                });
            }
            if(isCopied) return alert("You cannot add same element."); 
            else {
                todos.push(userInputValue);
                console.log(todos)
                window.localStorage.setItem("todosData", JSON.stringify(todos));
                addTodo(userInputValue);
            };
        };

        const todoManager = () => {
            let inputEl = document.querySelector("#todo-input");
            const addTodoBtnEl = document.querySelector("#addTodoBtn");
            if(!addTodoBtnEl || !inputEl) return;
            addTodoBtnEl.addEventListener("click", () => {
                let userInputValue = inputEl.value.trim();
                if(userInputValue.length < 1) {
                    alert("Empty Input Cannot able to save.")
                } else {
                    FilterTodos(userInputValue);
                    inputEl.value = "";
                }
            });
        }; todoManager();
    </script>
</body>
</html>
