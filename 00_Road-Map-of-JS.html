<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 100% Roadmap — Vanilla JS</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --card: #f8f9fa;
            --border: #dee2e6;
            --phase-bg: #e9ecef;
            --checkbox: #ced4da;
            --completed: #2ecc71;
            --hover: #e9ecef;
            --muted: #6c757d;
            --header-bg: #ffffff;
            --strike: #adb5bd;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .dark-mode {
            --bg: #0f0f0f;
            --text: #e4e4e4;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --phase-bg: #222222;
            --checkbox: #3a3a3a;
            --completed: #2ecc71;
            --hover: #2a2a2a;
            --muted: #999999;
            --header-bg: #111111;
            --strike: #555555;
            --shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding-bottom: 60px;
            line-height: 1.5;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            border-bottom: 2px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .header-left h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }

        .header-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
        .progress-container { display: flex; align-items: center; gap: 8px; }
        .progress-bar-wrapper { width: 180px; height: 8px; background: var(--checkbox); border-radius: 20px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--completed); border-radius: 20px; transition: width 0.4s ease; width: 0%; }
        .stat-number { font-weight: 700; color: var(--completed); font-size: 1rem; min-width: 20px; text-align: center; }

        .dark-toggle {
            padding: 9px 18px; border: 2px solid var(--border); background: var(--card);
            color: var(--text); border-radius: 25px; cursor: pointer; font-weight: 600;
            font-size: 0.85rem; transition: all 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .dark-toggle:hover { background: var(--hover); transform: scale(1.04); }

        .reset-btn {
            padding: 9px 18px; border: 2px solid #e74c3c; background: transparent;
            color: #e74c3c; border-radius: 25px; cursor: pointer; font-weight: 600;
            font-size: 0.85rem; transition: all 0.3s;
        }
        .reset-btn:hover { background: #e74c3c; color: white; }

        .container { max-width: 920px; margin: 24px auto; padding: 0 16px; }
        .phase-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 18px; overflow: hidden; }
        .phase-section:hover { box-shadow: var(--shadow); }
        .phase-header { background: var(--phase-bg); padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .phase-header:hover { background: var(--hover); }
        .phase-header h2 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .phase-arrow { transition: transform 0.25s; font-size: 0.7rem; display: inline-block; }
        .phase-section.open .phase-arrow { transform: rotate(90deg); }
        .phase-count { font-size: 0.78rem; color: var(--muted); font-weight: 400; }
        .topic-list { display: none; padding: 6px 10px 10px 10px; }
        .phase-section.open .topic-list { display: block; }
        .topic-item { display: flex; align-items: center; padding: 9px 12px; border-radius: 7px; cursor: pointer; transition: background 0.15s; gap: 10px; border-bottom: 1px solid var(--border); }
        .topic-item:last-child { border-bottom: none; }
        .topic-item:hover { background: var(--hover); }
        .topic-number { font-weight: 600; color: var(--muted); min-width: 30px; font-size: 0.78rem; }
        .topic-text { flex: 1; transition: all 0.25s; font-size: 0.9rem; }
        .topic-item.completed .topic-text { text-decoration: line-through; color: var(--strike); }
        .checkbox-circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--checkbox); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s; font-size: 10px; color: transparent; font-weight: 700; }
        .topic-item.completed .checkbox-circle { background: var(--completed); border-color: var(--completed); color: white; }
        .footer { text-align: center; color: var(--muted); padding: 30px 20px; font-size: 0.85rem; }

        @media (max-width: 640px) {
            .header { padding: 10px 14px; }
            .header-left h1 { font-size: 1.1rem; }
            .progress-bar-wrapper { width: 100px; }
            .dark-toggle, .reset-btn { padding: 7px 14px; font-size: 0.8rem; }
            .topic-item { padding: 7px 8px; gap: 6px; }
            .topic-text { font-size: 0.82rem; }
            .topic-number { min-width: 24px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

            <div class="progress-container">

                <span style="color:var(--muted);">/</span>

            </div>
            <div class="progress-bar-wrapper"><div class="progress-bar-fill" id="progressFill"></div></div>
            <span id="percentText" style="font-weight:700;min-width:36px;">0%</span>
            <button class="dark-toggle" id="darkToggle"><span id="darkIcon">🌙</span> <span id="darkText">Dark</span></button>
            <button class="reset-btn" id="resetBtn">↺ Reset</button>
        </div>
    </header>

    <div class="container" id="container"></div>
    <div class="footer">🚀 All progress auto-saved in LocalStorage · Click any topic to mark complete</div>

                    "Memoization — caching function results for repeated arguments",
                    "Debounce — delay execution until pause (search input pattern)",
                    "Throttle — limit execution rate (scroll, resize pattern)",
                    "Currying — transform f(a,b,c) into f(a)(b)(c)",
                    "Infinite Currying — sum(1)(2)(3)... with valueOf/toString",
                    "Function Composition — pipe() and compose() utilities",
                    "Memory Leaks: Detection — Chrome DevTools heap snapshot, comparison view",
                    "Memory Leaks: Common Causes — global vars, forgotten timers, detached DOM",
                    "Memory Leaks: Prevention — cleanup listeners, WeakMap for DOM data",
                    "Shadow DOM Basics — element.attachShadow({mode:'open'}), style encapsulation",
                    "Template Element — <template> tag, content property, cloneNode",
                    "Custom Elements Basics — customElements.define(), lifecycle callbacks",
                    "Security: XSS (Cross-Site Scripting) — innerHTML danger, escaping output",
                    "Security: CSRF (Cross-Site Request Forgery) — tokens, SameSite cookies",
                    "Security: CSP (Content Security Policy) — header basics, inline script blocking"
                ]
            },
            {
                phase: "Phase 11: Build Your Own — Polyfills (294–300)",
                topics: [
                    "MyPromise — full Promise class with then/catch/finally/static methods",
                    "myBind — custom Function.prototype.bind implementation",
                    "myCall — custom Function.prototype.call implementation",
                    "myApply — custom Function.prototype.apply implementation",
                    "myMap — custom Array.prototype.map polyfill",
                    "myFilter — custom Array.prototype.filter polyfill",
                    "myReduce — custom Array.prototype.reduce polyfill",
                    "myDebounce — custom debounce utility function",
                    "myThrottle — custom throttle utility function",
                    "Event Emitter — custom pub-sub event system with on/emit/off",
                    "Simple State Machine — vanilla JS state management pattern"
                ]
            }
        ];

        // ============================================================
        // LOCALSTORAGE
        // ============================================================
        const STORAGE_KEY = 'js-roadmap-final-completed';

        function getCompletedSet() {
            try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? new Set(JSON.parse(raw)) : new Set(); }
            catch (e) { return new Set(); }
        }

        function saveCompletedSet(set) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); }
            catch (e) { alert('LocalStorage full!'); }
        }

        function toggleTopic(topicId) {
            const completed = getCompletedSet();
            completed.has(topicId) ? completed.delete(topicId) : completed.add(topicId);
            saveCompletedSet(completed);
            refreshUIState();
        }

        function resetAll() {
            if (confirm('⚠️ Reset ALL progress? This cannot be undone.')) {
                localStorage.removeItem(STORAGE_KEY);
                refreshUIState();
            }
        }

        // ============================================================
        // DARK MODE
        // ============================================================
        const DARK_KEY = 'js-roadmap-final-dark';

        function getDarkMode() { return localStorage.getItem(DARK_KEY) === 'true'; }

        function setDarkMode(enabled) {
            localStorage.setItem(DARK_KEY, enabled);
            if (enabled) {
                document.body.classList.add('dark-mode');
                document.getElementById('darkIcon').textContent = '☀️';
                document.getElementById('darkText').textContent = 'Light';
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('darkIcon').textContent = '🌙';
                document.getElementById('darkText').textContent = 'Dark';
            }
        }

        function toggleDarkMode() { setDarkMode(!getDarkMode()); }

        // ============================================================
        // BUILD UI
        // ============================================================
        let allTopicIds = [];

        function buildUI() {
            const container = document.getElementById('container');
            container.innerHTML = '';
            allTopicIds = [];
            let globalIndex = 0;

            roadmapData.forEach((phase, phaseIndex) => {
                const section = document.createElement('div');
                section.className = 'phase-section open';

                const phaseTopicIds = [];
                for (let i = 0; i < phase.topics.length; i++) {
                    const id = `t-${globalIndex}`;
                    phaseTopicIds.push(id);
                    allTopicIds.push(id);
                    globalIndex++;
                }

                section.innerHTML = `
                    <div class="phase-header">
                        <h2>
                            <span class="phase-arrow">▶</span>
                            ${phase.phase}
                            <span class="phase-count" id="count-${phaseIndex}"></span>
                        </h2>
                    </div>
                    <div class="topic-list">
                        ${phase.topics.map((topic, i) => `
                            <div class="topic-item" data-id="${phaseTopicIds[i]}">
                                <span class="topic-number">#${(globalIndex - phase.topics.length + i + 1)}</span>
                                <span class="topic-text">${topic}</span>
                                <span class="checkbox-circle">✓</span>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(section);

                section.querySelector('.phase-header').addEventListener('click', () => {
                    section.classList.toggle('open');
                });

                section.querySelectorAll('.topic-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleTopic(item.dataset.id);
                    });
                });
            });

            document.getElementById('totalCount').textContent = allTopicIds.length;
        }

        // ============================================================
        // REFRESH UI STATE
        // ============================================================
        function refreshUIState() {
            const completed = getCompletedSet();
            const total = allTopicIds.length;
            const done = allTopicIds.filter(id => completed.has(id)).length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;

            document.getElementById('completedCount').textContent = done;
            document.getElementById('percentText').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';

            document.querySelectorAll('.topic-item').forEach(item => {
                item.classList.toggle('completed', completed.has(item.dataset.id));
            });

            let gIdx = 0;
            roadmapData.forEach((phase, pIdx) => {
                let phaseDone = 0;
                for (let i = 0; i < phase.topics.length; i++) {
                    if (completed.has(`t-${gIdx}`)) phaseDone++;
                    gIdx++;
                }
                const countEl = document.getElementById(`count-${pIdx}`);
                if (countEl) countEl.textContent = `(${phaseDone}/${phase.topics.length})`;
            });
        }

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            setDarkMode(getDarkMode());
            buildUI();
            refreshUIState();
            document.getElementById('darkToggle').addEventListener('click', toggleDarkMode);
            document.getElementById('resetBtn').addEventListener('click', resetAll);
        }

        init();
    </script>
</body>
</html>
